<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneio de Padel</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b1220;color:#e5e7eb;margin:0}
header{background:#020617;padding:32px;text-align:center;border-bottom:2px solid #1f2937}
h1{margin:0;font-size:36px}
.subtitle{opacity:.7;margin-top:6px}
.container{max-width:1200px;margin:auto;padding:30px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px}

.card{background:#111827;border-radius:14px;padding:18px;text-align:center}
.card h3{margin:0;font-size:13px;opacity:.7;text-transform:uppercase}
.card p{font-size:26px;margin:6px 0 0 0;font-weight:bold}

.progressBox{background:#111827;border-radius:12px;padding:20px;margin-bottom:30px}
.progressBar{width:100%;height:18px;background:#1f2937;border-radius:20px;overflow:hidden;margin-top:10px}
.progressFill{height:100%;background:#22c55e;width:0%}

table{width:100%;border-collapse:collapse;background:#0f172a;border-radius:12px;overflow:hidden}
th{background:#111827;text-transform:uppercase;font-size:12px}
th,td{padding:12px;border-bottom:1px solid #1f2937;text-align:center}

.rank1{background:#3f6212;font-weight:bold}
.rank2{background:#334155;font-weight:bold}
.rank3{background:#1e293b;font-weight:bold}

.expired{background:#7f1d1d}

.prazo{font-size:11px;opacity:.6}

button{background:#22c55e;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:bold}

.adminpanel{background:#111827;padding:20px;border-radius:12px;margin-bottom:30px}

input{padding:6px;border-radius:6px;border:none;margin:4px}

footer{margin-top:60px;text-align:center;font-size:12px;opacity:.6}
</style>
</head>

<body>

<header>
<h1>Torneio de Padel</h1>
<div class="subtitle">Liga todos contra todos · 10 duplas</div>
</header>

<div class="container">

<div class="adminpanel">
<h2>Painel Admin</h2>

<input type="password" id="password" placeholder="password">
<button onclick="loginAdmin()">Entrar</button>
<br>

<input type="number" id="match" placeholder="Jogo">
<input type="number" id="r1" placeholder="1 / 0">
<input type="number" id="r2" placeholder="1 / 0">
<button onclick="guardarResultado()">Guardar</button>

</div>

<div class="cards">

<div class="card"><h3>Duplas</h3><p id="totalEquipas"></p></div>
<div class="card"><h3>Jogos Totais</h3><p id="totalJogos"></p></div>
<div class="card"><h3>Jogos Realizados</h3><p id="jogosFeitos"></p></div>
<div class="card"><h3>Jogos por Fazer</h3><p id="jogosFalta"></p></div>

</div>

<div class="progressBox">

<b>Progresso do Torneio</b>
<div id="progressText"></div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

</div>

<section>

<h2>Ranking</h2>

<table id="tabela">

<thead>
<tr>
<th>Pos</th>
<th>Dupla</th>
<th>V</th>
<th>E</th>
<th>D</th>
<th>Dif</th>
<th>Pontos</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section>

<h2>Calendário de Jogos</h2>

<table id="jogos">

<thead>
<tr>
<th>#</th>
<th>Data</th>
<th>Dupla 1</th>
<th>Dupla 2</th>
<th>Resultado</th>
<th>Editar</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<footer>Ranking automático estilo liga</footer>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyDShcgUqasMECU2rA50PQvH4tBIcok412s",
 authDomain:"torneio-de-padel.firebaseapp.com",
 projectId:"torneio-de-padel",
 storageBucket:"torneio-de-padel.firebasestorage.app",
 messagingSenderId:"217863908513",
 appId:"1:217863908513:web:f1ee98e6c5b2e4edc8d4e0"
};

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let admin=false

window.loginAdmin=loginAdmin
window.guardarResultado=guardarResultado
window.editarResultado=editarResultado

const equipas=[
"Kary/Jota",
"Guiga / Zé Maria Reis",
"Nhe / João Santos",
"Nini / Duarte",
"Ramos / Batata",
"Jaime / Ricardo",
"Tuga / Marinho",
"Cuba / Formiga",
"João Paulo / Joninha",
"Filipe Braz / João Mantas"
]

const jogos=[ ... MANTIVE EXATAMENTE O TEU CALENDÁRIO COMPLETO ... ]

function loginAdmin(){
 const pass=document.getElementById("password").value
 if(pass=="padel123"){
  admin=true
  alert("Admin ativo")
  atualizarTudo()
 }
}

async function getResultado(i){
 const ref=doc(db,"resultados",String(i))
 const snap=await getDoc(ref)
 if(snap.exists()) return snap.data()
 return null
}

/* NOVA FUNÇÃO */
async function verificarExpiracao(i){

 const partes=jogos[i][0].split("/")
 const data=new Date(partes[2],partes[1]-1,partes[0])

 const limite=new Date(data)
 limite.setDate(limite.getDate()+14)

 const hoje=new Date()

 const res=await getResultado(i)

 if(!res && hoje>limite){

  await setDoc(doc(db,"resultados",String(i)),{
   r1:0,
   r2:0
  })

 }

}

function prazoTexto(i){

 const partes=jogos[i][0].split("/")
 const data=new Date(partes[2],partes[1]-1,partes[0])

 const limite=new Date(data)
 limite.setDate(limite.getDate()+14)

 const hoje=new Date()

 const diff=Math.ceil((limite-hoje)/(1000*60*60*24))

 if(diff<0) return "Prazo expirado"

 return diff+" dias restantes"

}

async function guardarResultado(){

 if(!admin) return

 const m=parseInt(document.getElementById("match").value)
 const r1=parseInt(document.getElementById("r1").value)
 const r2=parseInt(document.getElementById("r2").value)

 await setDoc(doc(db,"resultados",String(m)),{r1:r1,r2:r2})

 atualizarTudo()

}

async function editarResultado(i){

 if(!admin) return

 const acao=prompt("1 = inserir resultado\n2 = reset")

 if(acao=="2"){
  await setDoc(doc(db,"resultados",String(i)),{r1:0,r2:0})
  atualizarTudo()
  return
 }

 if(acao=="1"){

  const r1=prompt("Resultado dupla 1")
  const r2=prompt("Resultado dupla 2")

  if(r1===null||r2===null) return

  await setDoc(doc(db,"resultados",String(i)),{
   r1:parseInt(r1),
   r2:parseInt(r2)
  })

  atualizarTudo()

 }

}

async function renderJogos(){

 const tbody=document.querySelector("#jogos tbody")
 tbody.innerHTML=""

 for(let i=0;i<jogos.length;i++){

  await verificarExpiracao(i)

  const j=jogos[i]
  const res=await getResultado(i)

  let r="-"
  if(res) r=res.r1+" - "+res.r2

  let botao=""
  if(admin){
   botao='<button onclick="editarResultado('+i+')">Editar</button>'
  }

  const tr=document.createElement("tr")

  const prazo=prazoTexto(i)

  if(prazo=="Prazo expirado" && !res) tr.classList.add("expired")

  tr.innerHTML=
  "<td>"+i+"</td>"+
  "<td>"+j[0]+"</td>"+
  "<td>"+j[1]+"</td>"+
  "<td>"+j[2]+"</td>"+
  "<td>"+r+"<br><span class='prazo'>"+prazo+"</span></td>"+
  "<td>"+botao+"</td>"

  tbody.appendChild(tr)

 }

}

/* resto do código mantém-se exatamente igual */

async function calcularTabela(){ ... }
async function atualizarStats(){ ... }
async function atualizarTudo(){
 await renderJogos()
 await calcularTabela()
 await atualizarStats()
}

atualizarTudo()

</script>

</body>
</html>
